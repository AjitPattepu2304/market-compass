spring:
  application:
    name: market-compass
  # Allow both scheduled tasks to run concurrently (live-price refresh + market tick)
  task:
    scheduling:
      pool:
        size: 2

server:
  port: 8080

# ── Finnhub live price feed ────────────────────────────────────────────────────
# Sign up free at https://finnhub.io → copy your API key.
# Set FINNHUB_API_KEY env var (Render dashboard → Environment).
# If unset, app falls back to hardcoded static prices — everything still works.
finnhub:
  api:
    key: ${FINNHUB_API_KEY:}
