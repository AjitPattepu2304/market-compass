name: Contract Job Hunter

on:
  schedule:
    - cron: '0 */4 * * *'  # every 4 hours (saves Adzuna free tier quota)
  workflow_dispatch:        # manual trigger from GitHub Actions UI

jobs:
  hunt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run job hunter
        env:
          ADZUNA_APP_ID:  ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          EMAIL_FROM:     ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:       ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python job_hunter.py

      - name: Persist seen jobs to avoid duplicates across runs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f seen_jobs.json contract_jobs.csv contract_jobs.json || true
          git diff --cached --quiet || git commit -m "chore: update job hunter state [skip ci]"
          git push || true

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-jobs-${{ github.run_number }}
          path: |
            contract_jobs.csv
            contract_jobs.json
          retention-days: 30
